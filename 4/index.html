<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Phorest – Appointment Planner Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Inter', sans-serif; background: #f9fafb; overflow: hidden; }

  /* ───── Layout ─────────────────────────────────────────────────────── */
  .app { display: flex; height: 100vh; width: 100%; position: relative; overflow: hidden; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }

  /* ───── Sidebar ────────────────────────────────────────────────────── */
  .sidebar { width: 60px; background: linear-gradient(180deg,#009F6E,#019A6C); display: flex; flex-direction: column; align-items: center; padding: 12px 8px; gap: 8px; flex-shrink: 0; }
  .logo-tile { background: white; border-radius: 8px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }
  .clock { color: white; text-align: center; margin-bottom: 4px; }
  .clock .t { font-size: 13px; font-weight: 700; line-height: 1.1; }
  .clock .d { font-size: 11px; font-weight: 500; }
  .nav-group { display: flex; flex-direction: column; gap: 8px; width: 100%; }
  .nav-group.top { flex: 1; }
  .nav-btn { width: 100%; height: 44px; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; background: rgba(255,255,255,0.2); transition: background 120ms ease, box-shadow 120ms ease; color: white; }
  .nav-btn:not(.active):hover { background: rgba(255,255,255,0.32); box-shadow: inset 0 0 0 2px #fff; }
  .nav-btn.active { background: white; color: #000; }

  /* ───── Buttons ────────────────────────────────────────────────────── */
  .btn { font-family: 'Inter',sans-serif; font-size: 14px; font-weight: 500; border-radius: 4px; padding: 0 16px; height: 40px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 6px; white-space: nowrap; border: 1px solid #000; border-bottom-width: 2px; color: #000; }
  .btn-primary { background: #FBBF24; }
  .btn-primary:hover { background: #f5b01a; }
  .btn-secondary { background: #fff; }
  .btn-secondary:hover { background: #e5e7eb; }
  .btn-sm { padding: 0 12px; }
  .btn-xs { padding: 0 10px; gap: 4px; }
  .btn-icon { padding: 0 10px; }

  /* ───── Header ─────────────────────────────────────────────────────── */
  /* Background = sidebar green @ 10% over white = #E5F5F0 */
  .header { background: #E5F5F0; border-bottom: 1px solid #e5e7eb; padding: 0 16px; height: 60px; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .header .title { flex: 1; text-align: center; }
  .header .title .main { font-size: 15px; font-weight: 600; }
  .header .title .sub { font-size: 12px; color: #6b7280; }
  .view-group { display: flex; gap: 0; }
  .view-group .btn:first-child { border-radius: 4px 0 0 4px; }
  .view-group .btn:last-child { border-radius: 0 4px 4px 0; border-left: none; }

  /* ───── Sub-header ─────────────────────────────────────────────────── */
  .subheader { background: white; border-bottom: 1px solid #e5e7eb; padding: 0 16px; height: 56px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .day-pills { flex: 1; display: flex; gap: 0; justify-content: center; }
  .day-pills .btn { border-radius: 0; border-left: none; }
  .day-pills .btn:first-child { border-radius: 4px 0 0 4px; border-left: 1px solid #000; }
  .day-pills .btn:last-child { border-radius: 0 4px 4px 0; }

  /* ───── Body row (calendar + right rail) ───────────────────────────── */
  .body-row { flex: 1; display: flex; min-height: 0; overflow: hidden; }

  /* ───── Calendar ───────────────────────────────────────────────────── */
  .cal-wrap { flex: 1; display: flex; min-height: 0; overflow: hidden; min-width: 0; }
  .time-col { width: 52px; flex-shrink: 0; display: flex; flex-direction: column; }
  .time-col .spacer { height: 36px; border-bottom: 1px solid #e5e7eb; flex-shrink: 0; }
  .time-col .hours { flex: 1; display: flex; flex-direction: column; }
  .time-col .hour { flex: 1; border-bottom: 1px solid #f3f4f6; position: relative; }
  .time-col .hour-label { position: absolute; top: -7px; left: 6px; font-size: 10px; color: #9ca3af; background: #f9fafb; padding: 0 2px; }
  .staff-col { flex: 1; border-left: 1px solid #e5e7eb; display: flex; flex-direction: column; min-width: 0; }
  .staff-header { height: 36px; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; gap: 6px; padding: 0 8px; flex-shrink: 0; }
  .staff-header .avatar { width: 22px; height: 22px; border-radius: 50%; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 700; color: white; flex-shrink: 0; }
  .staff-header .name { font-size: 11px; font-weight: 600; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .slots { position: relative; flex: 1; display: flex; flex-direction: column; }
  .slot { flex: 1; min-height: 0; }
  .slot.even { background: #fff; }
  .slot.odd { background: #F3F4F6; }
  .appt { position: absolute; left: 2px; right: 2px; padding: 3px 6px; overflow: hidden; pointer-events: none; }
  .appt.is-new { outline: 2px solid #FBBF24; outline-offset: -1px; animation: pop 240ms ease-out; }
  @keyframes pop { 0% { transform: scale(0.92); } 60% { transform: scale(1.03); } 100% { transform: scale(1); } }
  .appt .n { font-size: 11px; font-weight: 700; color: white; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .appt .s { font-size: 11px; color: rgba(255,255,255,0.85); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .appt .t { font-size: 10px; color: rgba(255,255,255,0.8); }
  /* WCAG AA: switch to black text when background is too light for white */
  .appt.dark-text .n { color: #000; }
  .appt.dark-text .s { color: rgba(0,0,0,0.78); }
  .appt.dark-text .t { color: rgba(0,0,0,0.65); }

  /* Ghost availability slots — clickable overlays shown on the calendar
     while the planner is open and the user is choosing a time. */
  .ghost-slot { position: absolute; left: 3px; right: 3px; border: 1.5px dashed #2563EB; background: rgba(37,99,235,0.10); border-radius: 4px; cursor: pointer; padding: 3px 6px; display: flex; align-items: center; justify-content: center; transition: background 120ms ease, transform 120ms ease; z-index: 5; }
  .ghost-slot:hover { background: rgba(37,99,235,0.22); border-color: #1D4ED8; transform: scale(1.02); }
  .ghost-slot .gt { font-size: 10px; font-weight: 700; color: #1E40AF; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ───── Right rail ─────────────────────────────────────────────────── */
  .right-rail { width: 56px; flex-shrink: 0; background: #f9fafb; border-left: 1px solid #e5e7eb; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding: 12px 0; gap: 8px; }
  /* Right rail is irrelevant while planning — hide it to free space for calendar + slideover. */
  .body-row.planner-open .right-rail { display: none; }
  .rail-btn { width: 40px; height: 40px; border-radius: 4px; border: 1px solid #000; border-bottom-width: 2px; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; color: #000; }
  .rail-btn:hover { background: #e5e7eb; }
  .rail-btn svg { display: block; }

  /* ───── Footer ─────────────────────────────────────────────────────── */
  /* Background = sidebar green @ 10% over white = #E5F5F0 */
  .footer { background: #E5F5F0; border-top: 1px solid #e5e7eb; padding: 12px 16px; display: flex; gap: 8px; flex-shrink: 0; }

  /* ───── Slideover (shared) ─────────────────────────────────────────── */
  /* Slideovers are flex siblings within .body-row — they push the calendar instead of overlaying it. */
  .slideover-bg { display: none; flex-shrink: 0; height: 100%; }
  .slideover-bg.show { display: flex; }
  .slideover { width: 440px; background: white; height: 100%; display: flex; flex-direction: column; border-left: 1px solid #e5e7eb; box-shadow: -4px 0 16px rgba(0,0,0,0.06); overflow: hidden; }
  .slideover-header { padding: 16px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-shrink: 0; }
  .slideover-header .h-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .slideover-header .title { font-size: 17px; font-weight: 600; }
  .slideover-header .actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn { width: 40px; height: 40px; border-radius: 4px; border: 1px solid #000; border-bottom-width: 2px; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; color: #000; flex-shrink: 0; }
  .icon-btn:hover { background: #e5e7eb; }
  .slideover-body { flex: 1; overflow-y: auto; }

  /* ───── Inputs ─────────────────────────────────────────────────────── */
  .input { flex: 1; border: 1px solid #d1d5db; border-radius: 6px; padding: 8px 12px; font-size: 14px; font-family: 'Inter',sans-serif; outline: none; }
  .input:focus { border-color: #009F6E; box-shadow: 0 0 0 3px rgba(0,159,110,0.15); }

  /* ───── Client list ────────────────────────────────────────────────── */
  .search-area { padding: 14px 16px 8px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
  .search-row { display: flex; gap: 10px; }
  .section-label { font-size: 12px; color: #9ca3af; font-weight: 500; padding: 8px 16px 4px; }
  .section-label.alpha { font-weight: 600; padding: 10px 16px 4px; background: #f9fafb; }
  .client-row { display: flex; align-items: center; gap: 12px; padding: 11px 16px; cursor: pointer; border-bottom: 1px solid #f3f4f6; }
  .client-row:hover { background: #f9fafb; }
  .client-row .avatar { position: relative; width: 40px; height: 40px; border-radius: 50%; background: #9ca3af; color: white; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 600; flex-shrink: 0; overflow: hidden; }
  .client-row .avatar img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .client-row .info .n { font-size: 14px; font-weight: 500; }
  .client-row .info .p, .client-row .info .e { font-size: 12px; color: #6b7280; }
  .new-client-bar { border-top: 1px solid #e5e7eb; padding: 12px 16px; flex-shrink: 0; }

  /* ───── Service picker ─────────────────────────────────────────────── */
  .search-wrap { padding: 12px 16px 0; flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; }
  .field-label { font-size: 12px; font-weight: 500; color: #374151; margin-bottom: 6px; }
  .staff-select-wrap { position: relative; }
  .staff-trigger { width: 100%; display: flex; align-items: center; gap: 10px; border: 1px solid #d1d5db; border-radius: 6px; padding: 6px 36px 6px 8px; background: #fff; cursor: pointer; outline: none; font-family: 'Inter',sans-serif; text-align: left; min-height: 44px; }
  .staff-trigger:hover { background: #f9fafb; }
  .staff-trigger:focus-visible { border-color: #009F6E; box-shadow: 0 0 0 3px rgba(0,159,110,0.15); }
  .staff-trigger .av { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: white; flex-shrink: 0; background: #9ca3af; }
  .staff-trigger .text { flex: 1; min-width: 0; }
  .staff-trigger .name { font-size: 14px; font-weight: 600; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .staff-trigger .role { font-size: 12px; color: #6b7280; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .staff-trigger .placeholder { font-size: 14px; color: #6b7280; }
  .staff-select-wrap .chev { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #6b7280; transition: transform 120ms ease; }
  .staff-select-wrap.open .chev { transform: translateY(-50%) rotate(180deg); }
  .staff-menu { position: absolute; top: calc(100% + 4px); left: 0; right: 0; background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.12); z-index: 10; overflow: hidden; display: flex; flex-direction: column; max-height: 360px; }
  .staff-menu[hidden] { display: none; }
  .staff-menu-search { padding: 8px; border-bottom: 1px solid #f3f4f6; flex-shrink: 0; position: relative; }
  .staff-menu-search .icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #9ca3af; }
  .staff-menu-search input { width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 7px 10px 7px 32px; font-size: 13px; font-family: 'Inter',sans-serif; outline: none; }
  .staff-menu-search input:focus { border-color: #009F6E; box-shadow: 0 0 0 3px rgba(0,159,110,0.15); }
  .staff-menu-list { overflow-y: auto; padding: 4px 0; flex: 1; min-height: 0; }
  .staff-option { display: flex; align-items: center; gap: 12px; padding: 8px 12px; cursor: pointer; border: none; background: transparent; width: 100%; text-align: left; font-family: 'Inter',sans-serif; }
  .staff-option:hover, .staff-option:focus-visible { background: #f3f4f6; outline: none; }
  .staff-option .av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; }
  .staff-option .name { font-size: 14px; font-weight: 700; color: #111827; }
  .staff-option .role { font-size: 12px; color: #6b7280; margin-top: 1px; }
  .staff-option.is-any .av { background: #6b7280; }
  .staff-empty { padding: 16px 12px; text-align: center; font-size: 13px; color: #6b7280; }
  .search-field { position: relative; }
  .search-field .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); pointer-events: none; }
  .search-field .input { width: 100%; padding-left: 34px; }
  .cat-list { flex: 1; overflow-y: auto; margin-top: 12px; border-top: 1px solid #f3f4f6; }
  .cat-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
  .cat-row:hover { background: #f9fafb; }
  .cat-row .av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; }
  .cat-row .n { font-size: 14px; font-weight: 600; }
  /* Service item view (after picking a category) */
  #svcView { flex: 1; display: flex; flex-direction: column; overflow: hidden; margin-top: 12px; border-top: 1px solid #f3f4f6; }
  #svcView.hidden { display: none; }
  .svc-list { flex: 1; overflow-y: auto; }
  .svc-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
  .svc-item:hover { background: #f9fafb; }
  .svc-item .av { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; }
  .svc-item .info { flex: 1; min-width: 0; }
  .svc-item .n { font-size: 14px; font-weight: 700; color: #111827; }
  .svc-item .meta { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
  .svc-item .meta-item { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #6b7280; }
  .svc-item .meta-item svg { flex-shrink: 0; }

  /* ───── Planner main (Creating Appointments) ───────────────────────── */
  #plannerMainBody { background: #e5e7eb; }
  .panel { border: 1px solid #d1d5db; border-radius: 6px; background: white; margin: 0 16px 12px; padding: 12px; }
  .panel:first-child { margin-top: 12px; }
  .panel-h { font-size: 14px; font-weight: 600; margin-bottom: 10px; }
  .client-card { display: flex; align-items: center; gap: 12px; padding: 0; }
  .client-card .av { width: 44px; height: 44px; border-radius: 50%; background: #9ca3af; color: white; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; flex-shrink: 0; overflow: hidden; position: relative; }
  .client-card .av img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
  .client-card .n { font-size: 15px; font-weight: 600; }
  .client-card .p, .client-card .e { font-size: 13px; color: #6b7280; }
  .planner-svc { display: flex; align-items: stretch; border: 1px solid #e5e7eb; border-radius: 4px; overflow: hidden; margin-bottom: 8px; background: #fff; position: relative; }
  .planner-svc .bar { width: 6px; flex-shrink: 0; }
  .planner-svc .body { flex: 1; padding: 10px 12px; min-width: 0; }
  .planner-svc .row1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .planner-svc .n { font-size: 14px; font-weight: 700; }
  .planner-svc .with { font-family: 'Inter', sans-serif; font-size: 13px; color: #374151; cursor: pointer; background: #f3f4f6; border: 1px solid #d1d5db; border-radius: 4px; padding: 2px 8px; display: inline-flex; align-items: center; gap: 4px; line-height: 1.4; }
  .planner-svc .with:hover { background: #e5e7eb; border-color: #9ca3af; }
  .planner-svc .with .chev { color: #6b7280; flex-shrink: 0; }
  .planner-svc .pills { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
  .p-pill { border: 1px solid #d1d5db; border-radius: 4px; padding: 4px 10px; font-size: 12px; font-weight: 500; background: white; }
  .planner-svc .rm { width: 36px; align-self: center; border: none; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #6b7280; padding: 6px; }
  .planner-svc .rm:hover { color: #000; }
  /* Inline staff-change popover, portalled to body and positioned from the
     "with [staff]" trigger's viewport rect so .planner-svc overflow:hidden
     and slideover scroll/clipping don't crop it. */
  .staff-change-pop { position: fixed; background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; box-shadow: 0 8px 24px rgba(0,0,0,0.18); z-index: 1000; display: flex; flex-direction: column; max-height: 320px; min-width: 260px; overflow: hidden; }
  .staff-change-pop[hidden] { display: none; }
  .staff-change-pop .staff-menu-search { padding: 8px; border-bottom: 1px solid #f3f4f6; flex-shrink: 0; position: relative; }
  .staff-change-pop .staff-menu-search .icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); pointer-events: none; color: #9ca3af; }
  .staff-change-pop .staff-menu-search input { width: 100%; border: 1px solid #d1d5db; border-radius: 6px; padding: 7px 10px 7px 32px; font-size: 13px; font-family: 'Inter',sans-serif; outline: none; }
  .staff-change-pop .staff-menu-search input:focus { border-color: #009F6E; box-shadow: 0 0 0 3px rgba(0,159,110,0.15); }
  .staff-change-pop .staff-menu-list { overflow-y: auto; padding: 4px 0; flex: 1; min-height: 0; }
  .staff-change-pop .staff-option.is-current { background: #f3f4f6; }
  .staff-change-pop .staff-option.is-current .name::after { content: " ✓"; color: #009F6E; font-weight: 700; }
  .add-svc-row { padding: 4px 0 0; }

  /* Mini month calendar */
  .mini-cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .mini-cal-title { font-size: 14px; font-weight: 600; }
  .mini-cal-nav { display: flex; gap: 4px; }
  .mini-cal-nav button { width: 28px; height: 28px; border-radius: 4px; border: 1px solid #d1d5db; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #000; }
  .mini-cal-nav button:hover { background: #e5e7eb; }
  .mini-dow { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 4px; }
  .mini-dow > div { font-size: 10px; text-align: center; color: #9ca3af; text-transform: uppercase; font-weight: 600; padding: 4px 0; }
  .mini-days { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .mini-day { aspect-ratio: 1; min-height: 40px; max-height: 40px; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 4px; border: 1px solid transparent; background: transparent; cursor: default; color: #d1d5db; padding: 0; font-family: inherit; font-weight: 500; }
  .mini-day.available { color: #000; cursor: pointer; background: #fff; border: 1px solid #000; border-bottom-width: 2px; }
  .mini-day.available:hover { background: #e5e7eb; }
  .mini-day.today { border-color: #FBBF24; font-weight: 600; }
  .mini-day.available.today { border: 1px solid #FBBF24; border-bottom-width: 2px; }
  .mini-day.selected { background: #FBBF24; font-weight: 700; }
  .mini-day.available.selected { background: #FBBF24; border: 1px solid #000; border-bottom-width: 2px; }

  /* Time grid */
  .avail-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .avail-back { width: 28px; height: 28px; border-radius: 4px; border: 1px solid #d1d5db; background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #000; }
  .avail-back:hover { background: #e5e7eb; }
  .avail-date { font-size: 13px; color: #6b7280; }
  .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .time-slot { padding: 0; height: 38px; border-radius: 4px; border: 1px solid #000; border-bottom-width: 2px; background: white; font-family: inherit; font-size: 14px; font-weight: 500; cursor: pointer; color: #000; }
  .time-slot:hover { background: #FEEDA9; }
  .time-slot.disabled { border-color: #e5e7eb; color: #d1d5db; cursor: not-allowed; background: #f9fafb; }
  .time-slot.disabled:hover { background: #f9fafb; }

  /* Toast */

// ─── BUILD CALENDAR ───────────────────────────────────────────────────────
function buildCalendar() {
  const wrap = document.getElementById("calWrap");
  wrap.innerHTML = "";
  const totalSlots = HOURS.length * 4; // 44 slots of 15min
  const totalMinutes = HOURS.length * 60;

  // time column
  const timeCol = document.createElement("div");
  timeCol.className = "time-col";
  timeCol.innerHTML = `<div class="spacer"></div><div class="hours">${
    HOURS.map(h => `<div class="hour"><span class="hour-label">${String(h).padStart(2,"0")}:00</span></div>`).join("")
  }</div>`;
  wrap.appendChild(timeCol);

  // staff columns
  STAFF.forEach((s, ci) => {
    const col = document.createElement("div");
    col.className = "staff-col";

    const header = document.createElement("div");
    header.className = "staff-header";
    header.style.background = s.bg;
    header.innerHTML = `<div class="avatar">${s.initials}</div><div class="name">${s.name}</div>`;
    col.appendChild(header);

    const slots = document.createElement("div");
    slots.className = "slots";
    for (let i = 0; i < totalSlots; i++) {
      const slot = document.createElement("div");
      slot.className = "slot " + (i % 2 === 0 ? "even" : "odd");
      slots.appendChild(slot);
    }
    APPTS.filter(a => a.col === ci).forEach(a => {
      const topPct = (a.topPx / totalMinutes) * 100;
      const hPct = (a.hPx / totalMinutes) * 100;
      const card = document.createElement("div");
      const needsDark = needsDarkText(a.color);
      card.className = "appt" + (needsDark ? " dark-text" : "") + (a._new ? " is-new" : "");
      card.style.cssText = `top:${topPct}%; height:${hPct}%; background:${a.color}`;
      card.innerHTML = `<div class="n">${a.name}</div><div class="s">${a.service}</div>${a.time ? `<div class="t">${a.time}</div>` : ""}`;
      slots.appendChild(card);
    });
    col.appendChild(slots);
    wrap.appendChild(col);
  });
}

// Inline staff-change popover for a service card in the Creating Appointment slideover.
// Click "with [staff]" → opens a searchable picker anchored to the card. Pick → updates
// services[i].staffIdx and re-renders the list + ghost slots.
function openStaffChangePopover(serviceIdx) {
  closeStaffChangePopover(); // dismiss any other open instance first

  const card = document.querySelector(`.planner-svc[data-svc-idx="${serviceIdx}"]`);
  if (!card) return;
  const trigger = card.querySelector('.with');
  if (!trigger) return;

  const staffInitials = name => name.split(/\s+/).filter(Boolean).map(p => p[0]).slice(0,2).join('').toUpperCase();
  const currentIdx = plannerState.services[serviceIdx].staffIdx;

  const pop = document.createElement('div');
  pop.className = 'staff-change-pop';
  pop.setAttribute('role', 'dialog');
  pop.setAttribute('aria-label', 'Change staff member');
  pop.dataset.svcIdx = String(serviceIdx);
  pop.innerHTML = `
    <div class="staff-menu-search">
      <svg class="icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"/></svg>
      <input type="text" placeholder="Search staff…" aria-label="Search staff" autocomplete="off" />
    </div>
    <div class="staff-menu-list"></div>`;
  // Portal to body — escapes .planner-svc overflow:hidden and slideover clipping.
  document.body.appendChild(pop);

  // Position: prefer below the trigger, flip above if it would overflow the viewport.
  const positionPop = () => {
    const r = trigger.getBoundingClientRect();
    const popH = pop.offsetHeight;
    const popW = Math.max(pop.offsetWidth, 260);
    const margin = 4;
    let top = r.bottom + margin;
    let left = r.left;
    // Flip above if not enough room below
    if (top + popH > window.innerHeight - 8 && r.top - popH - margin > 8) {
      top = r.top - popH - margin;
    }
    // Clamp horizontally to viewport
    if (left + popW > window.innerWidth - 8) {
      left = window.innerWidth - popW - 8;
    }
    if (left < 8) left = 8;
    pop.style.top = `${top}px`;
    pop.style.left = `${left}px`;
  };

  const listEl = pop.querySelector('.staff-menu-list');
  const searchInput = pop.querySelector('input');

  const render = (query = '') => {
    const q = query.trim().toLowerCase();
    const matches = STAFF
      .map((s, idx) => ({ s, idx }))
      .filter(({ s }) => !q || s.name.toLowerCase().includes(q) || s.role.toLowerCase().includes(q));
    if (!matches.length) {
      listEl.innerHTML = `<div class="staff-empty">No staff matches “${query}”</div>`;
    } else {
      listEl.innerHTML = matches.map(({ s, idx }) => `
        <button type="button" class="staff-option${idx === currentIdx ? ' is-current' : ''}" role="option" data-idx="${idx}"${idx === currentIdx ? ' aria-current="true"' : ''}>
          <span class="av" style="background:${s.bg}" aria-hidden="true">${staffInitials(s.name)}</span>
          <span>
            <span class="name" style="display:block">${s.name}</span>
            <span class="role">${s.role}</span>
          </span>
        </button>`).join('');
    }
    positionPop();
  };
  render();

  searchInput.addEventListener('input', e => render(e.target.value));
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const first = listEl.querySelector('.staff-option');
      if (first) pickStaffForService(serviceIdx, parseInt(first.dataset.idx, 10));
    }
    if (e.key === 'Escape') closeStaffChangePopover();
  });
  listEl.addEventListener('click', e => {
    const opt = e.target.closest('.staff-option');
    if (!opt) return;
    pickStaffForService(serviceIdx, parseInt(opt.dataset.idx, 10));
  });

  // Reposition on scroll/resize so the popover follows the trigger.
  window.addEventListener('scroll', positionPop, true);
  window.addEventListener('resize', positionPop);

  // Outside click to close. Defer attach so the same click that opened it doesn't immediately close it.
  setTimeout(() => {
    document.addEventListener('click', staffChangeOutsideClick);
    searchInput.focus();
  }, 0);
}

function staffChangeOutsideClick(e) {
  const pop = document.querySelector('.staff-change-pop');
  if (!pop) return;
  // Don't close if the click is inside the popover OR on the "with" button that owns it.
  if (pop.contains(e.target)) return;
  if (e.target.closest('.planner-svc .with')) return;
  closeStaffChangePopover();
}

function closeStaffChangePopover() {
  document.removeEventListener('click', staffChangeOutsideClick);
  const pop = document.querySelector('.staff-change-pop');
  if (pop) {
    // Listeners use the same positionPop closure inside the open() scope;
    // removing the node is enough because handlers reference a now-orphaned element.
    // Still clean up window listeners so they don't pile up across opens.
    pop.remove();
  }
  // Window listeners are attached anonymously per open — there's no straightforward
  // handle to remove them. Replace this with a stored ref if it becomes a perf issue.
}

// Compute and overlay ghost availability slots on the calendar.
// The calendar displays "today" regardless of which date is picked in the
// slideover, so we dodge today's appointments. For a future date in real
// life, the calendar would re-render to that day's bookings — but in this
// prototype we just use today's data as the busy reference, which gives a
// representative visual of how the interaction would feel.
function renderCalendarGhosts() {
  clearCalendarGhosts();

  const sd = plannerState.selectedDate;
  if (!sd) return;

  // Total duration to fit: sum of all selected services (services run back-to-back).
  const totalDuration = plannerState.services.reduce((sum, s) => sum + s.duration, 0);
  if (totalDuration <= 0) return;

  // Which staff columns get overlays?
  // - If services are assigned to specific staff (default after picking), use those columns.
  // - Otherwise (theoretical: no staff yet), fall back to staffFilter or all staff.
  const colSet = new Set(plannerState.services.map(s => s.staffIdx));
  const cols = colSet.size ? [...colSet]
             : (plannerState.staffFilter !== null ? [plannerState.staffFilter]
             : STAFF.map((_, i) => i));

  const totalMinutes = HOURS.length * 60; // 11 hours * 60 = 660 = 9:00 → 20:00
  const calWrap = document.getElementById('calWrap');
  if (!calWrap) return;
  // staff-cols are children of calWrap after the time-col (index 0)
  const staffCols = calWrap.querySelectorAll('.staff-col');

  cols.forEach(colIdx => {
    const col = staffCols[colIdx];
    if (!col) return;
    const slotsEl = col.querySelector('.slots');
    if (!slotsEl) return;

    // Existing busy intervals on this staff column (in minutes after 9:00)
    const busy = APPTS
      .filter(a => a.col === colIdx)
      .map(a => ({ start: a.topPx, end: a.topPx + a.hPx }))
      .sort((x, y) => x.start - y.start);

    // Walk the day in 15-min steps and emit a ghost slot at the EARLIEST
    // window where `totalDuration` fits without intersecting a busy interval.
    // One ghost per staff column — the earliest opening.
    const step = 15;
    const dayStart = 0;
    const dayEnd = totalMinutes;
    for (let t = dayStart; t + totalDuration <= dayEnd; t += step) {
      const winStart = t;
      const winEnd = t + totalDuration;
      // Conflict if any busy interval overlaps [winStart, winEnd)
      const conflict = busy.some(b => b.start < winEnd && b.end > winStart);
      if (conflict) continue;

      const topPct = (winStart / totalMinutes) * 100;
      const hPct = (totalDuration / totalMinutes) * 100;
      const startH = Math.floor((winStart + 9 * 60) / 60);
      const startM = (winStart + 9 * 60) % 60;
      const ghost = document.createElement('button');
      ghost.type = 'button';
      ghost.className = 'ghost-slot';
      ghost.style.cssText = `top:${topPct}%; height:${hPct}%`;
      ghost.title = `Earliest available — book at ${pad2(startH)}:${pad2(startM)}`;
      ghost.innerHTML = `<span class="gt">${pad2(startH)}:${pad2(startM)}</span>`;
      ghost.addEventListener('click', () => pickTime(startH, startM));
      slotsEl.appendChild(ghost);
      break; // Earliest only — stop after the first valid window.
    }
  });
}

function clearCalendarGhosts() {
  const calWrap = document.getElementById('calWrap');
  if (!calWrap) return;
  calWrap.querySelectorAll('.ghost-slot').forEach(g => g.remove());
}

function renderMiniCalendar() {
  const { y, m } = plannerState.viewMonth;
  const monthName = new Date(y, m, 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
  const first = new Date(y, m, 1);
  const startOffset = (first.getDay() + 6) % 7; // Mon-first
  const daysInMonth = new Date(y, m + 1, 0).getDate();

  // Available dates: weekdays from "today" onwards, with a couple disabled at random
  const todayDt = new Date(TODAY.y, TODAY.m, TODAY.d);
  const isAvailable = (yy, mm, dd) => {
    const dt = new Date(yy, mm, dd);
    if (dt < todayDt) return false;
    const dow = dt.getDay();
    if (dow === 0 || dow === 6) return false;
    if (yy === 2026 && mm === 4 && (dd === 11 || dd === 19)) return false;
    return true;
  };

  let cells = '';
  for (let i = 0; i < startOffset; i++) cells += `<div></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const isToday = (y === TODAY.y && m === TODAY.m && d === TODAY.d);
    const avail = isAvailable(y, m, d);
    const sel = plannerState.selectedDate && plannerState.selectedDate.y === y && plannerState.selectedDate.m === m && plannerState.selectedDate.d === d;
    const cls = ['mini-day'];
    if (avail) cls.push('available');
    if (isToday) cls.push('today');
    if (sel) cls.push('selected');
    cells += `<button class="${cls.join(' ')}" ${avail ? `onclick="pickDate(${y},${m},${d})"` : 'disabled'}>${d}</button>`;
  }

  return `
    <div class="mini-cal-head">
      <div class="mini-cal-title">${monthName}</div>
      <div class="mini-cal-nav">
        <button onclick="navMonth(-1)" aria-label="Previous month">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
        </button>
        <button onclick="navMonth(1)" aria-label="Next month">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8.25 4.5l7.5 7.5-7.5 7.5"/></svg>
        </button>
      </div>
    </div>
    <div class="mini-dow"><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div></div>
    <div class="mini-days">${cells}</div>`;
}

function navMonth(delta) {
  const v = plannerState.viewMonth;
  v.m += delta;
  if (v.m < 0) { v.m = 11; v.y--; }
  if (v.m > 11) { v.m = 0; v.y++; }
  renderPlannerAvailability();
}

function pickDate(y, m, d) {
  plannerState.selectedDate = { y, m, d };
  plannerState.subView = 'time';
  renderPlannerAvailability();
}

function renderTimeGrid() {
  const slots = [];
  for (let h = 9; h <= 17; h++) {
    for (const mm of [0, 30]) {
      slots.push({ h, m: mm });
    }
  }
  const unavailable = new Set(['11:00','13:30','15:00','15:30']);
  const dateLabel = formatDateLong(plannerState.selectedDate);
  return `
    <div class="avail-head">
      <button class="avail-back" aria-label="Back to date" onclick="backToDate()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15.75 19.5 8.25 12l7.5-7.5"/></svg>
      </button>
      <div class="avail-date">${dateLabel}</div>
    </div>
    <div class="time-grid">
      ${slots.map(s => {
        const key = `${String(s.h).padStart(2,'0')}:${String(s.m).padStart(2,'0')}`;
        const disabled = unavailable.has(key);
        const display = formatTime12(s.h, s.m);
        return `<button class="time-slot${disabled ? ' disabled' : ''}" ${disabled ? 'disabled' : `onclick="pickTime(${s.h},${s.m})"`}>${display}</button>`;
      }).join('')}
    </div>`;
}

function backToDate() {
  plannerState.subView = 'date';
  renderPlannerAvailability();
}

function pickTime(h, m) {
  // Only book on today's calendar if the selected date is today; otherwise show a toast.
  const sd = plannerState.selectedDate;
  const isToday = sd && sd.y === TODAY.y && sd.m === TODAY.m && sd.d === TODAY.d;
  const clientName = shortName(plannerState.client.name);
  let cursor = h * 60 + m - 9 * 60; // minutes after 9:00
  const newAppts = [];
  for (const svc of plannerState.services) {
    const startH = Math.floor((cursor + 9 * 60) / 60);
    const startM = (cursor + 9 * 60) % 60;
    const endH = Math.floor((cursor + 9 * 60 + svc.duration) / 60);
    const endM = (cursor + 9 * 60 + svc.duration) % 60;
    newAppts.push({
      col: svc.staffIdx,
      topPx: cursor,
      hPx: svc.duration,
      name: clientName,
      service: svc.name,
      time: `${pad2(startH)}:${pad2(startM)}–${pad2(endH)}:${pad2(endM)}`,
      color: svc.color,
      _new: true,
    });
    cursor += svc.duration;
  }

  if (isToday) {
    APPTS.forEach(a => delete a._new);
    APPTS.push(...newAppts);
    buildCalendar();
    showToast(`Booked ${newAppts.length} appointment${newAppts.length > 1 ? 's' : ''} for ${clientName}`);
  } else {
    const dl = formatDateLong(sd);
    showToast(`Booked ${newAppts.length} appointment${newAppts.length > 1 ? 's' : ''} on ${dl}`);
  }
  plannerClose();
}

// ─── HELPERS ──────────────────────────────────────────────────────────────
// WCAG AA contrast check — returns true when black text gives better contrast than white.
function needsDarkText(bgHex) {
  const hex = bgHex.replace('#','');
  const r = parseInt(hex.slice(0,2),16)/255;
  const g = parseInt(hex.slice(2,4),16)/255;
  const b = parseInt(hex.slice(4,6),16)/255;
  const toLin = c => c <= 0.03928 ? c/12.92 : Math.pow((c+0.055)/1.055, 2.4);
  const L = 0.2126*toLin(r) + 0.7152*toLin(g) + 0.0722*toLin(b);
  // White-on-bg contrast must be >= 4.5 (AA normal text). If not, switch to black.
  return (1.05 / (L + 0.05)) < 4.5;
}
function pad2(n) { return String(n).padStart(2, '0'); }
function shortName(full) {
  const parts = full.split(' ');
  if (parts.length === 1) return full;
  return `${parts[0]} ${parts[parts.length-1][0]}.`;
}
function formatTime12(h, m) {
  const ampm = h >= 12 ? 'PM' : 'AM';
  const hh = h > 12 ? h - 12 : (h === 0 ? 12 : h);
  return `${hh}:${pad2(m)} ${ampm}`;
}
function formatDateLong({ y, m, d }) {
  return new Date(y, m, d).toLocaleDateString('en-US', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(() => t.classList.remove('show'), 2400);
}

// ─── INIT ─────────────────────────────────────────────────────────────────
buildCalendar();
buildClientList();
buildStaffFilter();

function buildStaffFilter() {
  const wrap = document.getElementById('staffSelectWrap');
  const trigger = document.getElementById('staffTrigger');
  const menu = document.getElementById('staffMenu');
  const list = document.getElementById('staffMenuList');
  const searchInput = document.getElementById('staffMenuSearch');
  if (!wrap || !trigger || !menu || !list || !searchInput) return;

  const staffInitials = name => name.split(/\s+/).filter(Boolean).map(p => p[0]).slice(0,2).join('').toUpperCase();

  const renderOptions = (query = '') => {
    const q = query.trim().toLowerCase();
    const matches = STAFF
      .map((s, idx) => ({ s, idx }))
      .filter(({ s }) => !q || s.name.toLowerCase().includes(q) || s.role.toLowerCase().includes(q));

    // "Any staff member" only shows when there's no active query
    const anyOpt = q ? '' : `
      <button type="button" class="staff-option is-any" role="option" data-idx="">
        <span class="av" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>
        </span>
        <span>
          <span class="name" style="display:block">Any staff member</span>
          <span class="role">All rostered staff</span>
        </span>
      </button>`;
    const staffOpts = matches.map(({ s, idx }) => `
      <button type="button" class="staff-option" role="option" data-idx="${idx}">
        <span class="av" style="background:${s.bg}" aria-hidden="true">${staffInitials(s.name)}</span>
        <span>
          <span class="name" style="display:block">${s.name}</span>
          <span class="role">${s.role}</span>
        </span>
      </button>`).join('');

    if (!anyOpt && !staffOpts) {
      list.innerHTML = `<div class="staff-empty">No staff matches “${query}”</div>`;
    } else {
      list.innerHTML = anyOpt + staffOpts;
    }
  };

  renderOptions();

  const setSelected = idx => {
    const av = document.getElementById('staffTriggerAv');
    const text = document.getElementById('staffTriggerText');
    if (idx === null) {
      plannerState.staffFilter = null;
      av.style.background = '#9ca3af';
      av.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17.982 18.725A7.488 7.488 0 0 0 12 15.75a7.488 7.488 0 0 0-5.982 2.975m11.963 0a9 9 0 1 0-11.963 0m11.963 0A8.966 8.966 0 0 1 12 21a8.966 8.966 0 0 1-5.982-2.275M15 9.75a3 3 0 1 1-6 0 3 3 0 0 1 6 0z"/></svg>';
      text.innerHTML = '<span class="placeholder">Any staff member</span>';
    } else {
      const s = STAFF[idx];
      plannerState.staffFilter = idx;
      av.style.background = s.bg;
      av.textContent = staffInitials(s.name);
      text.innerHTML = `<span class="name">${s.name}</span>`;
    }
  };

  const closeMenu = () => {
    menu.hidden = true;
    wrap.classList.remove('open');
    trigger.setAttribute('aria-expanded', 'false');
    searchInput.value = '';
    renderOptions();
  };
  const openMenu = () => {
    menu.hidden = false;
    wrap.classList.add('open');
    trigger.setAttribute('aria-expanded', 'true');
    // Defer focus until the menu is rendered so it actually lands
    setTimeout(() => searchInput.focus(), 0);
  };

  trigger.addEventListener('click', e => {
    e.stopPropagation();
    menu.hidden ? openMenu() : closeMenu();
  });
  searchInput.addEventListener('input', e => {
    renderOptions(e.target.value);
  });
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      // Pick the first matching staff option (skip "Any" since it's only there with no query)
      const first = list.querySelector('.staff-option:not(.is-any)');
      if (first) {
        const v = first.dataset.idx;
        setSelected(v === '' ? null : parseInt(v, 10));
        closeMenu();
      }
    }
  });
  list.addEventListener('click', e => {
    const opt = e.target.closest('.staff-option');
    if (!opt) return;
    const v = opt.dataset.idx;
    setSelected(v === '' ? null : parseInt(v, 10));
    closeMenu();
  });
  document.addEventListener('click', e => {
    if (!wrap.contains(e.target)) closeMenu();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !menu.hidden) closeMenu();
  });
}
</script>
