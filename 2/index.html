<style>
  :root { --blue: #BFDBFE; --yellow: #FCD34D; }
  html, body { font-family: 'Inter', system-ui, sans-serif; height: 100%; margin: 0; }
  body { background: #f9fafb; color: #000; }
  /* Hide native number-input arrows on the small split inputs only when needed; keep default for table */
  .slideover-panel { animation: slideIn 220ms ease-out; }
  @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
  /* Secondary button style — matches design system: 1px black border, 2px bottom, 40px height */
  .btn-primary {
    height: 40px; padding: 0 16px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border-radius: 4px; background: #fbbf24; border: 1px solid #000; border-bottom-width: 2px;
    color: #000; font-size: 14px; font-weight: 500; cursor: pointer; transition: background-color 120ms;
  }
  .btn-primary:hover { background: #f59e0b; }
  .btn-primary:disabled { background: #e5e7eb; border-color: #d1d5db; color: #9ca3af; cursor: not-allowed; }
  .btn-secondary {
    height: 40px; padding: 0 16px; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    border-radius: 4px; background: #fff; border: 1px solid #000; border-bottom-width: 2px;
    color: #000; font-size: 14px; font-weight: 500; cursor: pointer; transition: background-color 120ms;
  }
  .btn-secondary:hover { background: #f9fafb; }
  .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }
  .input-field {
    display: flex; align-items: center; gap: 8px; padding: 0 12px; height: 40px;
    background: #fff; border: 1px solid #9ca3af; border-radius: 4px;
  }
  .input-field input {
    flex: 1; min-width: 0; font-size: 14px; outline: none; background: transparent; border: 0; color: #000;
  }
  .input-field input::placeholder { color: #9ca3af; }
  .icon { width: 20px; height: 20px; flex-shrink: 0; stroke-width: 1.75; }
  .icon-sm { width: 16px; height: 16px; flex-shrink: 0; stroke-width: 1.75; }
  /* Sidebar */
  .sidebar {
    width: 60px; background: linear-gradient(180deg, #009F6E, #019A6C);
    display: flex; flex-direction: column; align-items: center; padding: 12px 8px; gap: 8px; flex-shrink: 0;
  }
  .sidebar-icon-btn {
    width: 100%; height: 44px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.2); cursor: pointer;
  }
  .sidebar-icon-btn.active { background: white; }
  /* Hide scrollbar visually but keep functionality */
  .scrollable { scrollbar-width: thin; }

/* ---------- Tiny helpers ---------- */
function h(tag, props, ...children) {
  const el = document.createElement(tag);
  if (props) {
    for (const [k, v] of Object.entries(props)) {
      if (k === "class") el.className = v;
      else if (k === "style" && typeof v === "object") Object.assign(el.style, v);
      else if (k.startsWith("on") && typeof v === "function") el.addEventListener(k.slice(2).toLowerCase(), v);
      else if (v === true) el.setAttribute(k, "");
      else if (v !== false && v != null) el.setAttribute(k, v);
    }
  }
  for (const c of children.flat()) {
    if (c == null || c === false) continue;
    el.appendChild(typeof c === "string" || typeof c === "number" ? document.createTextNode(c) : c);
  }
  return el;
}

function svgIcon(name, cls = "icon", strokeColor = "currentColor", fillColor = "none") {
  const ns = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(ns, "svg");
  svg.setAttribute("viewBox", "0 0 24 24");
  svg.setAttribute("fill", fillColor);
  svg.setAttribute("stroke", strokeColor);
  svg.setAttribute("stroke-linecap", "round");
  svg.setAttribute("stroke-linejoin", "round");
  svg.setAttribute("stroke-width", "1.75");
  svg.setAttribute("class", cls);
  svg.innerHTML = iconPaths[name] || "";
  return svg;
}

/* ---------- Reusable buttons / inputs ---------- */
function btnPrimary({ onClick, disabled, children }) {
  const b = h("button", { class: "btn-primary", onclick: onClick, disabled: disabled ? true : undefined });
  for (const c of [].concat(children)) b.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  return b;
}
function btnSecondary({ onClick, disabled, children, full = false }) {
  const b = h("button", { class: "btn-secondary" + (full ? " w-full" : ""), onclick: onClick, disabled: disabled ? true : undefined });
  for (const c of [].concat(children)) b.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  return b;
}
function inputField({ value = "", placeholder = "", iconName, onInput, className = "" }) {
  const wrap = h("div", { class: "input-field " + className });
  if (iconName) {
    const ic = svgIcon(iconName, "icon", "#9ca3af");
    wrap.appendChild(ic);
  }
  const input = h("input", { type: "text", value, placeholder });
  if (onInput) input.addEventListener("input", e => onInput(e.target.value));
  wrap.appendChild(input);
  return wrap;
}

/* ---------- Slideover ----------
   Keeps the panel mounted across state updates so the slide-in animation
   only plays once. Subsequent calls patch the title/body/footer in place. */
let slideoverEl = null;
let slideoverParts = null; // { titleEl, bodyEl, footerEl, headerEl, backHandler, closeHandler }

function openSlideover({ title, onClose, onBack, contentEl, footerEl, width = 480 }) {
  // If a slideover is already open, patch its contents in place instead of recreating.
  if (slideoverEl && slideoverParts) {
    slideoverParts.titleEl.textContent = title;

    // Update back button presence
    const headerEl = slideoverParts.headerEl;
    const existingBack = slideoverParts.backBtn;
    if (onBack && !existingBack) {
      const back = h("button", {
        class: "rounded border border-black bg-white flex items-center justify-center hover:bg-gray-50 shrink-0",
        style: { width: "36px", height: "36px", borderBottomWidth: "2px" },
        onclick: () => { closeSlideover(); onBack(); }
      });
      back.appendChild(svgIcon("arrowL", "icon-sm", "#000"));
      headerEl.insertBefore(back, headerEl.firstChild);
      slideoverParts.backBtn = back;
    } else if (!onBack && existingBack) {
      existingBack.remove();
      slideoverParts.backBtn = null;
    } else if (onBack && existingBack) {
      // Refresh handler so it points to the new onBack
      const fresh = existingBack.cloneNode(true);
      fresh.addEventListener("click", () => { closeSlideover(); onBack(); });
      existingBack.replaceWith(fresh);
      slideoverParts.backBtn = fresh;
    }

    // Refresh close handler
    slideoverParts.closeBtn.replaceWith(slideoverParts.closeBtn.cloneNode(true));
    const newClose = headerEl.lastChild;
    newClose.addEventListener("click", () => { closeSlideover(); onClose && onClose(); });
    slideoverParts.closeBtn = newClose;

    // Replace body content
    slideoverParts.bodyEl.innerHTML = "";
    slideoverParts.bodyEl.appendChild(contentEl);

    // Replace/remove footer
    if (footerEl) {
      slideoverParts.footerEl.innerHTML = "";
      slideoverParts.footerEl.appendChild(footerEl);
      slideoverParts.footerEl.style.display = "";
    } else {
      slideoverParts.footerEl.innerHTML = "";
      slideoverParts.footerEl.style.display = "none";
    }

    // Update width if it changed
    slideoverParts.panel.style.width = width + "px";

    // Update backdrop click handler
    slideoverParts.backdrop.replaceWith(slideoverParts.backdrop.cloneNode(true));
    const newBackdrop = slideoverEl.firstChild;
    newBackdrop.addEventListener("click", () => { closeSlideover(); onClose && onClose(); });
    slideoverParts.backdrop = newBackdrop;

    return;
  }

  // First open — build the structure and play the animation.
  const overlay = h("div", { class: "fixed inset-0 z-50", style: { fontFamily: "Inter, sans-serif" } });
  const backdrop = h("div", { class: "absolute inset-0", style: { background: "rgba(0,0,0,0.4)" }, onclick: () => { closeSlideover(); onClose && onClose(); } });
  overlay.appendChild(backdrop);

  const panel = h("div", {
    class: "absolute top-0 right-0 bottom-0 bg-white shadow-2xl flex flex-col slideover-panel",
    style: { width: width + "px", maxWidth: "100vw" }
  });

  const headerEl = h("div", { class: "flex items-center gap-3 px-5 border-b border-gray-200 shrink-0", style: { height: "64px" } });

  let backBtn = null;
  if (onBack) {
    backBtn = h("button", {
      class: "rounded border border-black bg-white flex items-center justify-center hover:bg-gray-50 shrink-0",
      style: { width: "36px", height: "36px", borderBottomWidth: "2px" },
      onclick: () => { closeSlideover(); onBack(); }
    });
    backBtn.appendChild(svgIcon("arrowL", "icon-sm", "#000"));
    headerEl.appendChild(backBtn);
  }
  const titleEl = h("h2", { class: "text-lg font-semibold flex-1 min-w-0 truncate" }, title);
  headerEl.appendChild(titleEl);
  const closeBtn = h("button", {
    class: "rounded hover:bg-gray-100 flex items-center justify-center shrink-0",
    style: { width: "32px", height: "32px" },
    onclick: () => { closeSlideover(); onClose && onClose(); }
  });
  closeBtn.appendChild(svgIcon("x", "icon", "#000"));
  headerEl.appendChild(closeBtn);
  panel.appendChild(headerEl);

  const bodyEl = h("div", { class: "flex-1 overflow-y-auto overflow-x-hidden" });
  bodyEl.appendChild(contentEl);
  panel.appendChild(bodyEl);

  const footerWrap = h("div", { class: "border-t border-gray-200 px-5 py-4 shrink-0 bg-white" });
  if (footerEl) {
    footerWrap.appendChild(footerEl);
  } else {
    footerWrap.style.display = "none";
  }
  panel.appendChild(footerWrap);

  overlay.appendChild(panel);
  document.body.appendChild(overlay);
  slideoverEl = overlay;
  slideoverParts = { panel, headerEl, titleEl, bodyEl, footerEl: footerWrap, backBtn, closeBtn, backdrop };
}
function closeSlideover() {
  if (slideoverEl) { slideoverEl.remove(); slideoverEl = null; slideoverParts = null; }
}

function selectProduct(product) {
  const splitPct = 100 / state.selectedStaffIds.length;
  const splits = state.selectedStaffIds.map(id => {
    const credited = round2((product.price * splitPct) / 100);
    return {
      staffId: id,
      split: round2(splitPct),
      credited,
      commission: round2(credited * COMMISSION_RATE)
    };
  });
  state.items.push({
    id: `${product.id}-${Date.now()}`,
    productId: product.id,
    name: product.name,
    brand: product.brand,
    price: product.price,
    quantity: 1,
    splits
  });
  state.stage = "none";
  closeSlideover();
  renderApp();
}

function round2(n) { return Math.round(n * 100) / 100; }

/* ---------- Step 3: Edit Commission Split ---------- */
function openEditSplit(itemId) {
  state.editingItemId = itemId;
  state.showAddStaff = false;
  const item = state.items.find(i => i.id === itemId);
  let splits = item.splits.map(s => ({ ...s }));

  function recalc() {
    splits.forEach(s => {
      s.credited = round2((item.price * s.split) / 100);
      s.commission = round2(s.credited * COMMISSION_RATE);
    });
  }

  function updateSplit(index, raw) {
    const value = Math.max(0, Math.min(100, Number(raw) || 0));
    splits[index].split = value;
    const remaining = 100 - value;
    const others = splits.filter((_, i) => i !== index);
    const othersTotal = others.reduce((sum, s) => sum + s.split, 0);
    if (others.length > 0) {
      if (othersTotal > 0) {
        others.forEach(s => { s.split = round2((s.split / othersTotal) * remaining); });
      } else {
        const each = remaining / others.length;
        others.forEach(s => { s.split = round2(each); });
      }
    }
    recalc();
  }

  function addStaff(staff) {
    if (splits.find(s => s.staffId === staff.id)) { state.showAddStaff = false; rerender(); return; }
    const newSplit = round2(100 / (splits.length + 1));
    splits = splits.map(s => ({ ...s, split: newSplit }));
    splits.push({ staffId: staff.id, split: newSplit, credited: 0, commission: 0 });
    recalc();
    state.showAddStaff = false;
    rerender();
  }

  function removeStaff(index) {
    if (splits.length <= 1) return;
    splits.splice(index, 1);
    const each = round2(100 / splits.length);
    splits.forEach(s => { s.split = each; });
    recalc();
    rerender();
  }

  function render() {
    const content = h("div", { class: "p-5 space-y-6" });

    /* Product details */
    const pSection = h("div");
    pSection.appendChild(h("p", { class: "text-xs font-semibold uppercase tracking-wide text-gray-500 mb-2" }, "Product details"));
    const pCard = h("div", { class: "border border-gray-200 rounded p-4 flex items-center gap-3" });
    const pInitials = item.brand.split(" ").map(w => w[0]).join("").slice(0, 2);
    pCard.appendChild(h("div", {
      class: "rounded-full bg-gray-200 flex items-center justify-center text-xs font-semibold text-gray-700 shrink-0",
      style: { width: "40px", height: "40px" }
    }, pInitials));
    const pMeta = h("div", { class: "flex-1 min-w-0" });
    pMeta.appendChild(h("div", { class: "text-sm font-medium truncate" }, item.name));
    pMeta.appendChild(h("div", { class: "text-xs text-gray-500 truncate" }, `${item.brand} · Qty ${item.quantity}`));
    pCard.appendChild(pMeta);
    pCard.appendChild(h("div", { class: "text-sm font-semibold" }, "$" + item.price.toFixed(2)));
    pSection.appendChild(pCard);
    content.appendChild(pSection);

    /* Sale attribution */
    const attrSection = h("div");
    const totalSplit = splits.reduce((s, x) => s + x.split, 0);
    const totalCredited = splits.reduce((s, x) => s + x.credited, 0);
    const totalCommission = splits.reduce((s, x) => s + x.commission, 0);
    const headRow = h("div", { class: "flex items-center justify-between mb-2" });
    headRow.appendChild(h("p", { class: "text-xs font-semibold uppercase tracking-wide text-gray-500" }, "Sale attribution & commission breakdown"));
    headRow.appendChild(h("span", {
      class: "text-xs font-semibold",
      style: { color: Math.abs(totalSplit - 100) < 0.5 ? "#15803d" : "#dc2626" }
    }, `Total: ${totalSplit.toFixed(1)}%`));
    attrSection.appendChild(headRow);

    const tableWrap = h("div", { class: "border border-gray-200 rounded overflow-hidden" });
    const table = h("table", { class: "w-full table-fixed border-collapse" });
    const colgroup = h("colgroup");
    [["40%"], ["20%"], ["18%"], ["18%"], ["4%"]].forEach(([w]) => colgroup.appendChild(h("col", { style: { width: w } })));
    table.appendChild(colgroup);

    const thead = h("thead");
    const trH = h("tr", { class: "text-white text-xs font-semibold", style: { background: "#0c4a6e" } });
    ["Staff", "Split", "Credited", "Commission", ""].forEach(label => {
      trH.appendChild(h("th", { class: "px-3 text-left font-semibold", style: { height: "40px" } }, label));
    });
    thead.appendChild(trH);
    table.appendChild(thead);

    const tbody = h("tbody");
    splits.forEach((s, i) => {
      const staff = ROSTERED_STAFF.find(st => st.id === s.staffId);
      const tr = h("tr", { class: "border-t border-gray-100 hover:bg-gray-50" });

      const tdStaff = h("td", { class: "px-3 py-2 align-middle" });
      const stWrap = h("div", { class: "flex items-center gap-2 min-w-0" });
      stWrap.appendChild(Avatar(staff, 28));
      stWrap.appendChild(h("span", { class: "text-sm truncate" }, staff.name));
      tdStaff.appendChild(stWrap);
      tr.appendChild(tdStaff);

      const tdSplit = h("td", { class: "px-3 py-2 align-middle" });
      const sWrap = h("div", { class: "flex items-center gap-1" });
      const inp = h("input", {
        type: "number", min: "0", max: "100", step: "1",
        class: "px-2 py-1 border border-gray-400 rounded text-sm bg-white text-right",
        style: { width: "64px" },
        value: String(s.split)
      });
      inp.addEventListener("input", e => { updateSplit(i, e.target.value); rerender(); });
      sWrap.appendChild(inp);
      sWrap.appendChild(h("span", { class: "text-sm text-gray-500" }, "%"));
      tdSplit.appendChild(sWrap);
      tr.appendChild(tdSplit);

      tr.appendChild(h("td", { class: "px-3 py-2 align-middle text-sm" }, "$" + s.credited.toFixed(2)));
      tr.appendChild(h("td", { class: "px-3 py-2 align-middle text-sm" }, "$" + s.commission.toFixed(2)));

      const tdAct = h("td", { class: "align-middle" });
      const actWrap = h("div", { class: "flex justify-center" });
      const rm = h("button", {
        class: "rounded hover:bg-red-50 flex items-center justify-center",
        style: { width: "28px", height: "28px" },
        onclick: () => removeStaff(i),
        disabled: splits.length <= 1 ? true : undefined
      });
      const trashIcon = svgIcon("trash", "icon-sm", "#dc2626");
      if (splits.length <= 1) rm.style.opacity = "0.3";
      rm.appendChild(trashIcon);
      actWrap.appendChild(rm);
      tdAct.appendChild(actWrap);
      tr.appendChild(tdAct);

      tbody.appendChild(tr);
    });

    const totRow = h("tr", { class: "border-t border-gray-200 font-semibold", style: { background: "#f9fafb" } });
    totRow.appendChild(h("td", { class: "px-3 py-2 align-middle text-sm" }, "Total"));
    totRow.appendChild(h("td", { class: "px-3 py-2 align-middle text-sm" }, totalSplit.toFixed(1) + "%"));
    totRow.appendChild(h("td", { class: "px-3 py-2 align-middle text-sm" }, "$" + totalCredited.toFixed(2)));
    totRow.appendChild(h("td", { class: "px-3 py-2 align-middle text-sm" }, "$" + totalCommission.toFixed(2)));
    totRow.appendChild(h("td"));
    tbody.appendChild(totRow);
    table.appendChild(tbody);
    tableWrap.appendChild(table);
    attrSection.appendChild(tableWrap);

    /* Add staff */
    const availableToAdd = ROSTERED_STAFF.filter(s => !splits.find(sp => sp.staffId === s.id));
    const addWrap = h("div", { class: "mt-3 relative" });
    if (!state.showAddStaff) {
      const btn = btnSecondary({
        onClick: () => { state.showAddStaff = true; rerender(); },
        disabled: availableToAdd.length === 0,
        full: true,
        children: [svgIcon("plus", "icon-sm", "#000"), " Add Staff Member"]
      });
      addWrap.appendChild(btn);
    } else {
      const list = h("div", { class: "border border-gray-300 rounded shadow-lg bg-white overflow-hidden" });
      const lh = h("div", { class: "flex items-center justify-between px-3 py-2 border-b border-gray-100" });
      lh.appendChild(h("span", { class: "text-xs font-semibold uppercase tracking-wide text-gray-500" }, "Add staff"));
      const xb = h("button", { class: "text-gray-400 hover:text-black", onclick: () => { state.showAddStaff = false; rerender(); } });
      xb.appendChild(svgIcon("x", "icon-sm", "currentColor"));
      lh.appendChild(xb);
      list.appendChild(lh);
      availableToAdd.forEach(staff => {
        const row = h("button", {
          class: "w-full flex items-center gap-3 px-3 py-2 hover:bg-gray-50 text-left",
          onclick: () => addStaff(staff)
        });
        row.appendChild(Avatar(staff, 28));
        const m = h("div", { class: "flex-1 min-w-0" });
        m.appendChild(h("div", { class: "text-sm font-medium truncate" }, staff.name));
        m.appendChild(h("div", { class: "text-xs text-gray-500 truncate" }, staff.role));
        row.appendChild(m);
        list.appendChild(row);
      });
      addWrap.appendChild(list);
    }
    attrSection.appendChild(addWrap);

    attrSection.appendChild(h("p", { class: "text-xs text-gray-500 mt-3" },
      "Adjusting any split will redistribute the remaining percentage among the other staff so the total always equals 100%."
    ));
    content.appendChild(attrSection);

    /* Footer */
    const footer = h("div", { class: "flex justify-end gap-3" });
    footer.appendChild(btnSecondary({ onClick: () => { state.editingItemId = null; closeSlideover(); }, children: "Cancel" }));
    footer.appendChild(btnPrimary({
      onClick: () => {
        const item = state.items.find(i => i.id === state.editingItemId);
        item.splits = splits.map(s => ({ ...s }));
        state.editingItemId = null;
        closeSlideover();
        renderApp();
      },
      children: "Save"
    }));

    openSlideover({
      title: "Split commission",
      contentEl: content,
      footerEl: footer,
      width: 600,
      onClose: () => { state.editingItemId = null; }
    });
  }
  function rerender() { render(); }
  render();
}

  const addList = h("div", { class: "space-y-2" });
  const addItems = [
    { icon: "star",    label: "Hot Keys" },
    { icon: "hand",    label: "Services" },
    { icon: "gallery", label: "Series" },
    { icon: "tag",     label: "Products", onClick: () => openCommissionStep() },
    { icon: "gift",    label: "Gift Cards" },
    { icon: "crown",   label: "Memberships" },
  ];
  addItems.forEach(({ icon, label, onClick }) => {
    const b = h("button", { class: "btn-secondary w-full", onclick: onClick });
    b.appendChild(svgIcon(icon, "icon-sm", "#000"));
    b.appendChild(h("span", null, label));
    addList.appendChild(b);
  });
  addBox.appendChild(addList);
  addItemWrap.appendChild(addBox);
  left.appendChild(addItemWrap);

  cols.appendChild(left);

  /* Right column: items table */
  const right = h("div", { class: "flex-1 flex flex-col min-w-0 min-h-0" });
  const tableShell = h("div", { class: "border border-gray-200 rounded overflow-hidden flex flex-col flex-1 min-h-0" });

  const tableScroll = h("div", { class: "flex-1 overflow-y-auto" });
  const itemsTable = h("table", { class: "w-full table-fixed border-collapse" });
  const cg = h("colgroup");
  ["20%", "30%", "12%", "14%", "14%", "10%"].forEach(w => cg.appendChild(h("col", { style: { width: w } })));
  itemsTable.appendChild(cg);

  const thead = h("thead");
  const trh = h("tr", { class: "text-white text-sm font-semibold", style: { background: "#0c4a6e" } });
  ["Staff", "Item", "Quantity", "Discount", "Price", ""].forEach(label =>
    trh.appendChild(h("th", { class: "px-3 text-left font-semibold", style: { height: "44px" } }, label))
  );
  thead.appendChild(trh);
  itemsTable.appendChild(thead);

  const tbody = h("tbody");
  if (state.items.length === 0) {
    const tr = h("tr");
    tr.appendChild(h("td", { colspan: "6", class: "text-center text-sm text-gray-400", style: { height: "256px" } }, "No items added yet"));
    tbody.appendChild(tr);
  } else {
    state.items.forEach(item => {
      const tr = h("tr", { class: "border-t border-gray-100" });
      const staffNames = item.splits.length === 1
        ? (ROSTERED_STAFF.find(s => s.id === item.splits[0].staffId)?.name || "")
        : `${item.splits.length} staff (split)`;
      tr.appendChild(h("td", { class: "px-3 py-3 align-middle text-sm truncate" }, staffNames));
      tr.appendChild(h("td", { class: "px-3 py-3 align-middle text-sm truncate" }, item.name));
      tr.appendChild(h("td", { class: "px-3 py-3 align-middle text-sm" }, String(item.quantity)));
      tr.appendChild(h("td", { class: "px-3 py-3 align-middle text-sm" }, "None"));
      tr.appendChild(h("td", { class: "px-3 py-3 align-middle text-sm" }, "$" + item.price.toFixed(2)));

      const tdAct = h("td", { class: "px-3 py-3 align-middle relative" });
      const actWrap = h("div", { class: "flex justify-end gap-1 items-center" });

      const moreBtn = h("button", {
        class: "rounded hover:bg-gray-100 flex items-center justify-center",
        style: { width: "32px", height: "32px" },
        onclick: e => {
          e.stopPropagation();
          state.openMenuId = state.openMenuId === item.id ? null : item.id;
          renderApp();
        }
      });
      moreBtn.appendChild(svgIcon("more", "icon-sm", "#000"));
      actWrap.appendChild(moreBtn);

      const xBtn = h("button", {
        class: "rounded hover:bg-gray-100 flex items-center justify-center",
        style: { width: "32px", height: "32px" },
        onclick: () => {
          state.items = state.items.filter(i => i.id !== item.id);
          renderApp();
        }
      });
      xBtn.appendChild(svgIcon("x", "icon-sm", "#000"));
      actWrap.appendChild(xBtn);

      if (state.openMenuId === item.id) {
        const menuBackdrop = h("div", { class: "fixed inset-0 z-10", onclick: () => { state.openMenuId = null; renderApp(); } });
        actWrap.appendChild(menuBackdrop);
        const menu = h("div", {
          class: "absolute z-20 bg-white border border-gray-200 rounded shadow-lg py-1",
          style: { right: "48px", top: "40px", width: "208px" }
        });
        const splitOpt = h("button", {
          class: "w-full text-left px-3 py-2 text-sm hover:bg-gray-50",
          onclick: () => { state.openMenuId = null; openEditSplit(item.id); }
        }, "Split Commission");
        menu.appendChild(splitOpt);
        menu.appendChild(h("button", { class: "w-full text-left px-3 py-2 text-sm hover:bg-gray-50" }, "Apply discount"));
        menu.appendChild(h("button", { class: "w-full text-left px-3 py-2 text-sm hover:bg-gray-50" }, "Edit price"));
        actWrap.appendChild(menu);
      }

      tdAct.appendChild(actWrap);
      tr.appendChild(tdAct);
      tbody.appendChild(tr);
    });
  }
  itemsTable.appendChild(tbody);
  tableScroll.appendChild(itemsTable);
  tableShell.appendChild(tableScroll);

  const totDue = state.items.reduce((s, i) => s + i.price * i.quantity, 0);
  const totBar = h("div", {
    class: "flex justify-end items-center px-4 py-3 border-t border-gray-200 shrink-0",
    style: { background: "var(--blue)" }
  });
  const totSpan = h("span", { class: "text-sm" });
  totSpan.innerHTML = `Amount Due: <strong>$${totDue.toFixed(2)}</strong>`;
  totBar.appendChild(totSpan);
  tableShell.appendChild(totBar);

  right.appendChild(tableShell);
  cols.appendChild(right);
  mid.appendChild(cols);
  main.appendChild(mid);

  /* Fixed footer */
  const footer = h("div", { class: "flex justify-between items-center px-6 py-4 border-t border-gray-200 bg-white shrink-0" });
  const footerLeft = h("div", { class: "flex gap-2" });
  ["Petty Cash", "Notes", "Professional", "Generate quote"].forEach(label =>
    footerLeft.appendChild(btnSecondary({ children: label }))
  );
  footer.appendChild(footerLeft);
  const payBtn = btnPrimary({
    disabled: state.items.length === 0,
    children: [svgIcon("cart", "icon-sm", "#000"), " Pay"]
  });
  footer.appendChild(payBtn);
  main.appendChild(footer);

  root.appendChild(main);
}

renderApp();
</script>
</body>
</html>
